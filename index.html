<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Core</title>
    <script src="https://www.glowscript.org/lib/jquery/2.1/jquery.min.js" crossorigin="anonymous"></script>
    <script src="https://www.glowscript.org/lib/jquery/ui/1.11.4/jquery-ui.custom.min.js" crossorigin="anonymous"></script>
    <script src="https://www.glowscript.org/package/glow.3.2.min.js" crossorigin="anonymous"></script>
    <script src="https://www.glowscript.org/package/RSrun.3.2.min.js" crossorigin="anonymous"></script>
</head>
<body style="margin: 0; background: white; text-align: center; font-family: sans-serif;">

    <div id="glowscript" class="glowscript"></div>

<script type="text/vp">
GlowScript 3.2 VPython

# --- SETUP ---
scene = canvas(width=window.innerWidth, height=window.innerHeight, background=vector(1,1,1))
scene.range = 4.2
scene.forward = vector(-1.2, -1.1, -1.3)

# --- COLORS ---
EMPTY=0; RED=1; BLUE=2
PALETTE = {
    EMPTY: vector(0.97, 0.97, 1.0),
    RED:   vector(1.0, 0.75, 0.75), 
    BLUE:  vector(0.4, 0.75, 0.85)
}

current_p = RED

# --- CLICK LOGIC ---
def on_click(evt):
    global current_p
    p = evt.canvas.mouse.pick
    if p:
        p.color = PALETTE[current_p]
        current_p = BLUE if current_p == RED else RED

# --- CREATE GRID ---
for x in [-1, 0, 1]:
    for y in [-1, 0, 1]:
        for z in [-1, 0, 1]:
            if x==0 and y==0 and z==0: continue
            box(pos=vector(x,y,z), size=vector(0.85, 0.85, 0.85), color=PALETTE[EMPTY], opacity=0.7)

scene.bind("click", on_click)
</script>
</body>
</html>
