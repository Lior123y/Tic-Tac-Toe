<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Void Core</title>
    <script type="text/javascript" src="https://www.glowscript.org/lib/jquery/2.1/jquery.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/lib/jquery/ui/1.11.4/jquery-ui.custom.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/package/glow.3.2.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/package/RSrun.3.2.min.js"></script>
</head>
<body style="margin:0; background-color: #f0f0f0;">

    <div id="ui-layer" style="position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none;">
        <h1 style="font-family: sans-serif; color: #333; margin: 0;">The Void Core</h1>
        <p style="font-family: sans-serif; color: #666;">Status: <span id="engine-status">Loading Engine...</span></p>
    </div>

    <div id="glowscript" class="glowscript"></div>

<script type="text/vp">
GlowScript 3.2 VPython

# Update the status text so we know Python is running
document.getElementById('engine-status').innerHTML = "Online"
document.getElementById('engine-status').style.color = "green"

# --- GAME LOGIC ---
EMPTY = 0; RED = 1; BLUE = 2
COLORS = {
    EMPTY: vector(0.97, 0.97, 1.0),
    RED:   vector(1.0, 0.75, 0.75),
    BLUE:  vector(0.4, 0.75, 0.85)
}

scene = canvas(width=window.innerWidth, height=window.innerHeight, background=vector(1,1,1))
scene.forward = vector(-1.2, -1, -1.3)

# Build the grid
cubes = []
for x in [-1, 0, 1]:
    for y in [-1, 0, 1]:
        for z in [-1, 0, 1]:
            if x==0 and y==0 and z==0: continue
            b = box(pos=vector(x,y,z), size=vector(0.85,0.85,0.85), color=COLORS[EMPTY], opacity=0.7)
            b.game_state = EMPTY
            cubes.append(b)

# Interaction
def on_click(evt):
    picked = evt.canvas.mouse.pick
    if picked and hasattr(picked, 'game_state') and picked.game_state == EMPTY:
        # Determine player based on simple turn count logic
        current_color = COLORS[RED] if (scene.user_data % 2 == 0) else COLORS[BLUE]
        picked.color = current_color
        picked.game_state = RED # Simplified for test
        scene.user_data += 1

scene.user_data = 0
scene.bind("click", on_click)

while True:
    rate(60)
</script>
</body>
</html>
