<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Void Core</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/glowscript/glowscript@3.2/lib/jquery/2.1/jquery.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/glowscript/glowscript@3.2/lib/jquery/ui/1.11.4/jquery-ui.custom.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/glowscript/glowscript@3.2/package/glow.3.2.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/glowscript/glowscript@3.2/package/RSrun.3.2.min.js"></script>
</head>
<body style="margin: 0; background-color: #ffffff; text-align: center; font-family: sans-serif;">

    <div id="loading-zone" style="padding: 50px;">
        <h1 style="color: #444; letter-spacing: 2px;">THE VOID CORE</h1>
        <p id="status" style="color: #999;">Requesting 3D engine from Global CDN...</p>
    </div>

    <div id="glowscript" class="glowscript"></div>

<script type="text/vp">
GlowScript 3.2 VPython

# Once this runs, we hide the loading text
document.getElementById('status').innerHTML = "Engine Online"
document.getElementById('status').style.color = "green"
setTimeout(lambda: setattr(document.getElementById('loading-zone'), 'style', 'display:none'), 1000)

# --- GAME SETUP ---
scene = canvas(width=window.innerWidth, height=600, background=vector(1,1,1), userzoom=False)
scene.range = 4.2
scene.forward = vector(-1.2, -1.0, -1.3)

EMPTY=0; RED=1; BLUE=2
PALETTE = {EMPTY: vector(0.97, 0.97, 1), RED: vector(1, 0.75, 0.75), BLUE: vector(0.4, 0.75, 0.85)}

current_p = RED
cubes = []

# --- INTERACTION ---
def on_click(evt):
    global current_p
    p = evt.canvas.mouse.pick
    if p:
        p.color = PALETTE[current_p]
        current_p = BLUE if current_p == RED else RED

# --- INITIALIZE GRID ---
for x in [-1, 0, 1]:
    for y in [-1, 0, 1]:
        for z in [-1, 0, 1]:
            if x==0 and y==0 and z==0: continue
            b = box(pos=vector(x,y,z), size=vector(0.85, 0.85, 0.85), color=PALETTE[EMPTY], opacity=0.7)
            cubes.append(b)

scene.bind("click", on_click)

while True:
    rate(60)
</script>
</body>
</html>
