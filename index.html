<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Void Core</title>
    <script type="text/javascript" src="https://www.glowscript.org/lib/jquery/2.1/jquery.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/lib/jquery/ui/1.11.4/jquery-ui.custom.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/package/glow.3.2.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/package/RSrun.3.2.min.js"></script>
</head>
<body style="margin: 0; background-color: #ffffff;">

    <div id="glowscript" class="glowscript"></div>

<script type="text/vp">
GlowScript 3.2 VPython

# --- 1. SETTINGS & PALETTE ---
EMPTY = 0; RED = 1; BLUE = 2
PALETTE = {
    EMPTY: vector(0.97, 0.97, 1.0),
    RED:   vector(1.0, 0.75, 0.75),  # Quartz
    BLUE:  vector(0.4, 0.75, 0.85)   # Aquamarine
}

# --- 2. SCENE SETUP ---
scene = canvas(width=800, height=500, background=vector(1,1,1), userzoom=False)
scene.range = 4.2
scene.forward = vector(-1.2, -1.0, -1.3)

# --- 3. GLOBAL VARIABLES ---
cubes_list = []
states_list = []
current_p = RED
animating = False

# --- 4. UI ELEMENTS ---
scene.append_to_caption("\n")
status_label = wtext(text="Current: Quartz")
scene.append_to_caption("\n\n")

# --- 5. FUNCTIONS ---
def switch_player():
    global current_p
    current_p = BLUE if current_p == RED else RED
    status_label.text = "Current: " + ("Quartz" if current_p == RED else "Aquamarine")

def on_click(evt):
    global animating
    if animating: return
    picked = evt.canvas.mouse.pick
    if picked:
        for i in range(len(cubes_list)):
            if cubes_list[i] == picked and states_list[i] == EMPTY:
                states_list[i] = current_p
                picked.color = PALETTE[current_p]
                switch_player()
                return

def animate_rotation(axis_name, layer_val, direction):
    global animating
    if animating: return
    animating = True
    
    affected = []
    for c in cubes_list:
        val = 0
        if axis_name == "x": val = c.pos.x
        elif axis_name == "y": val = c.pos.y
        elif axis_name == "z": val = c.pos.z
        if abs(val - layer_val) < 0.1: affected.append(c)

    rot_axis = vector(1,0,0) if axis_name == "x" else (vector(0,1,0) if axis_name == "y" else vector(0,0,1))
    
    steps = 15
    for i in range(steps):
        rate(60)
        for obj in affected:
            obj.rotate(angle=(pi/2*direction)/steps, axis=rot_axis, origin=vector(0,0,0))
    
    switch_player()
    animating = False

def handle_reset(b):
    global current_p, animating
    if animating: return
    for i in range(len(cubes_list)):
        c = cubes_list[i]
        # Reset position based on original grid
        states_list[i] = EMPTY
        c.color = PALETTE[EMPTY]
        c.axis = vector(1,0,0)
        c.up = vector(0,1,0)
    current_p = RED
    status_label.text = "Current: Quartz"

# --- 6. INITIALIZE BOARD ---
for x in [-1, 0, 1]:
    for y in [-1, 0, 1]:
        for z in [-1, 0, 1]:
            if x==0 and y==0 and z==0: continue
            b = box(pos=vector(x,y,z), size=vector(0.85, 0.85, 0.85), color=PALETTE[EMPTY], opacity=0.7)
            cubes_list.append(b)
            states_list.append(EMPTY)

# --- 7. UI BUTTONS ---
def make_rot(ax, lv, dr):
    return lambda b: animate_rotation(ax, lv, dr)

scene.append_to_caption("Horizontal (Y): ")
button(text=" ↺ ", bind=make_rot("y", 1, 1))
button(text=" ↻ ", bind=make_rot("y", 1, -1))
scene.append_to_caption("\n")
button(text="RESET BOARD", bind=handle_reset)

# --- 8. EVENTS ---
scene.bind("click", on_click)

while True:
    rate(60)
</script>
</body>
</html>
