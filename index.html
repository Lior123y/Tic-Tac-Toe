<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Void Core</title>
    <script type="text/javascript" src="https://www.glowscript.org/lib/jquery/2.1/jquery.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/lib/jquery/ui/1.11.4/jquery-ui.custom.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/package/glow.3.2.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/package/RSrun.3.2.min.js"></script>
</head>
<body style="margin:0; padding:0; overflow:hidden;">
    <div id="glowscript" class="glowscript"></div>

<script type="text/vp">
GlowScript 3.2 VPython

# ============================================================
# HOLLOW CUBE TIC-TAC-TOE - FINAL STABLE
# ============================================================

EMPTY = 0; RED = 1; BLUE = 2
COLORS = {
    EMPTY: vector(0.97, 0.97, 1.0),
    RED:   vector(1.0, 0.75, 0.75),
    BLUE:  vector(0.4, 0.75, 0.85)
}

scene = canvas(width=window.innerWidth, height=window.innerHeight, background=vector(1,1,1))
scene.forward = vector(-1.2, -1, -1.3)

class Game:
    def __init__(self):
        self.cubes = {}
        self.current = RED
        self.animating = False
        
        # UI Elements
        self.status = wtext(text="Move 1 | Current: Quartz")
        scene.append_to_caption("\n\n")
        button(text="RESET BOARD", bind=self.reset)
        scene.append_to_caption("\n\n")

        # Rotation Controls
        def rot_y(b): self.rotate("y", 1)
        button(text="Rotate Top (Y)", bind=rot_y)

        for x in [-1, 0, 1]:
            for y in [-1, 0, 1]:
                for z in [-1, 0, 1]:
                    if x==0 and y==0 and z==0: continue
                    p = vector(x, y, z)
                    b = box(pos=p, size=vector(0.85, 0.85, 0.85), color=COLORS[EMPTY], opacity=0.7)
                    self.cubes[str(x)+str(y)+str(z)] = {"obj": b, "state": EMPTY}

        def click_cb(evt): self.click(evt)
        scene.bind("click", click_cb)

    def rotate(self, axis, layer):
        if self.animating: return
        self.animating = True
        affected = []
        for key in self.cubes:
            c = self.cubes[key]["obj"]
            if abs(c.pos.y - layer) < 0.1: affected.append(c)
        
        steps = 10
        for i in range(steps):
            rate(60)
            for obj in affected:
                obj.rotate(angle=(pi/2)/steps, axis=vector(0,1,0), origin=vector(0,0,0))
        
        self.current = BLUE if self.current == RED else RED
        self.status.text = "Current: " + ("Quartz" if self.current == RED else "Aquamarine")
        self.animating = False

    def click(self, evt):
        p = scene.mouse.pick
        if p:
            for key in self.cubes:
                if self.cubes[key]["obj"] == p and self.cubes[key]["state"] == EMPTY:
                    p.color = COLORS[self.current]
                    self.cubes[key]["state"] = self.current
                    self.current = BLUE if self.current == RED else RED
                    self.status.text = "Current: " + ("Quartz" if self.current == RED else "Aquamarine")

    def reset(self, b):
        for key in self.cubes:
            item = self.cubes[key]
            item["obj"].color = COLORS[EMPTY]
            item["state"] = EMPTY
        self.current = RED

g = Game()
</script>
</body>
</html>
