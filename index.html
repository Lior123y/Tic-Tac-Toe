<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Void Core</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/glowscript/glowscript@3.2/lib/jquery/2.1/jquery.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/glowscript/glowscript@3.2/lib/jquery/ui/1.11.4/jquery-ui.custom.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/glowscript/glowscript@3.2/package/glow.3.2.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/glowscript/glowscript@3.2/package/RSrun.3.2.min.js"></script>
</head>
<body style="margin: 0; background-color: #ffffff; text-align: center;">

    <div id="ui-overlay" style="padding: 20px;">
        <h1 style="font-family: sans-serif; color: #444;">THE VOID CORE</h1>
        <p id="engine-status" style="font-family: sans-serif; color: #999;">Attempting to start 3D engine...</p>
    </div>

    <div id="glowscript" class="glowscript"></div>

<script type="text/vp">
GlowScript 3.2 VPython

# Change status when Python starts
document.getElementById('engine-status').innerHTML = "Engine Online - Rendering Cubes"
document.getElementById('engine-status').style.color = "green"

# --- SCENE SETUP ---
scene = canvas(width=800, height=500, background=vector(1,1,1))
scene.range = 4.2
scene.forward = vector(-1.2, -1.0, -1.3)

# --- COLORS ---
EMPTY=0; RED=1; BLUE=2
PALETTE = {
    EMPTY: vector(0.97, 0.97, 1.0),
    RED:   vector(1.0, 0.75, 0.75), # Quartz
    BLUE:  vector(0.4, 0.75, 0.85)  # Aquamarine
}

# --- INITIALIZE ---
current_player = RED
cubes = []

def on_click(evt):
    global current_player
    p = evt.canvas.mouse.pick
    if p:
        p.color = PALETTE[current_player]
        current_player = BLUE if current_player == RED else RED

# Build 3D Grid
for x in [-1, 0, 1]:
    for y in [-1, 0, 1]:
        for z in [-1, 0, 1]:
            if x==0 and y==0 and z==0: continue
            b = box(pos=vector(x,y,z), size=vector(0.85, 0.85, 0.85), 
                    color=PALETTE[EMPTY], opacity=0.7)
            cubes.append(b)

scene.bind("click", on_click)

while True:
    rate(60)
</script>
</body>
</html>
